version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: cloudjudge-backend
    ports:
      - "8000:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-mysql+aiomysql://root:password@db:3306/cloudjudge}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cloudjudge-network
    restart: unless-stopped

  # Frontend Web
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: cloudjudge-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - cloudjudge-network
    restart: unless-stopped

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: cloudjudge-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-cloudjudge}
      - MYSQL_USER=${MYSQL_USER:-cloudjudge}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-password}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cloudjudge-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  cloudjudge-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
