# GitHub Actions CI/CD Workflow
name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  SERVICE_NAME_BACKEND: cloudjudge-backend
  SERVICE_NAME_FRONTEND: cloudjudge-frontend

jobs:
  # Backend Tests
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest --cov=app

  # Frontend Tests
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  # Build and Deploy
  deploy:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker

      # Build and push backend
      - name: Build backend image
        run: |
          docker build \
            -t "gcr.io/$PROJECT_ID/$SERVICE_NAME_BACKEND:$GITHUB_SHA" \
            -f docker/Dockerfile.backend \
            .

      - name: Push backend image
        run: |
          docker push "gcr.io/$PROJECT_ID/$SERVICE_NAME_BACKEND:$GITHUB_SHA"

      # Build and push frontend
      - name: Build frontend image
        run: |
          docker build \
            -t "gcr.io/$PROJECT_ID/$SERVICE_NAME_FRONTEND:$GITHUB_SHA" \
            -f docker/Dockerfile.frontend \
            .

      - name: Push frontend image
        run: |
          docker push "gcr.io/$PROJECT_ID/$SERVICE_NAME_FRONTEND:$GITHUB_SHA"

      # Deploy to Cloud Run (Backend)
      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME_BACKEND \
            --image "gcr.io/$PROJECT_ID/$SERVICE_NAME_BACKEND:$GITHUB_SHA" \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --port 8080 \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --set-env-vars "SECRET_KEY=${{ secrets.SECRET_KEY }}" \
            --set-env-vars "ENVIRONMENT=production"

      # Deploy to Cloud Run (Frontend)
      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME_FRONTEND \
            --image "gcr.io/$PROJECT_ID/$SERVICE_NAME_FRONTEND:$GITHUB_SHA" \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 256Mi \
            --cpu 1

      - name: Show output
        run: |
          echo "Backend deployed!"
          echo "Frontend deployed!"
